<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI - படிப்பு உதவியாளர்</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a1a2e; --secondary: #16213e; --accent: #e94560; --gold: #f5a623;
    --teal: #0f9b8e; --light: #eaf6f6; --white: #ffffff; --text: #2d3436;
    --muted: #636e72; --card-bg: #ffffff; --border: #e0e0e0;
    --shadow: 0 8px 32px rgba(26,26,46,0.12); --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', 'Baloo Thambi 2', sans-serif; background: linear-gradient(135deg, #f0f4ff 0%, #e8f8f5 50%, #fef9ee 100%); min-height: 100vh; color: var(--text); }
  header { background: linear-gradient(135deg, var(--primary) 0%, #0f3460 100%); padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 68px; }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent), var(--gold)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 14px rgba(233,69,96,0.4); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 4px 14px rgba(233,69,96,0.4); } 50% { box-shadow: 0 4px 24px rgba(233,69,96,0.7); } }
  .logo-text { font-family: 'Baloo Thambi 2', sans-serif; font-size: 24px; font-weight: 800; color: white; letter-spacing: -0.5px; }
  .logo-text span { color: var(--gold); }
  .header-badge { background: rgba(245,166,35,0.2); border: 1px solid rgba(245,166,35,0.4); color: var(--gold); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .hero { text-align: center; padding: 56px 24px 40px; max-width: 760px; margin: 0 auto; animation: fadeInUp 0.7s ease; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .hero h1 { font-family: 'Baloo Thambi 2', sans-serif; font-size: clamp(28px, 5vw, 44px); font-weight: 800; color: var(--primary); margin-bottom: 14px; }
  .hero h1 span { background: linear-gradient(135deg, var(--accent), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subjects-section { max-width: 900px; margin: 0 auto 28px; padding: 0 20px; text-align: center; }
  .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .chip { padding: 8px 18px; border-radius: 30px; font-size: 14px; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: all 0.2s ease; font-family: 'Baloo Thambi 2', sans-serif; }
  .chip.active { box-shadow: 0 6px 18px rgba(0,0,0,0.15); transform: translateY(-2px); background: var(--primary); color: white; }
  .chat-wrapper { max-width: 860px; margin: 0 auto 40px; padding: 0 20px; }
  .chat-box { background: white; border-radius: 24px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--border); }
  .chat-header { background: linear-gradient(135deg, var(--primary), #0f3460); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .messages { height: 380px; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .msg { display: flex; gap: 10px; max-width: 88%; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-bubble { padding: 13px 18px; border-radius: 18px; font-size: 15px; line-height: 1.7; }
  .msg.ai .msg-bubble { background: #f4f6ff; border: 1px solid #e8ebff; }
  .msg.user .msg-bubble { background: var(--primary); color: white; }
  .chat-input-area { border-top: 1px solid var(--border); padding: 16px 20px; background: #fafbff; }
  .input-row { display: flex; gap: 10px; }
  #questionInput { flex: 1; border: 2px solid var(--border); border-radius: 14px; padding: 13px 18px; outline: none; resize: none; }
  .send-btn { width: 52px; height: 52px; background: var(--accent); border: none; border-radius: 14px; color: white; cursor: pointer; }
  .typing-indicator { display: flex; gap: 5px; padding: 10px; }
  .typing-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: typing 1.2s infinite; }
  @keyframes typing { 0%,100% { opacity: 0.4; } 50% { opacity: 1; transform: translateY(-4px); } }
  footer { text-align: center; padding: 24px; color: var(--muted); border-top: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#"><div class="logo-icon">📚</div><div class="logo-text">Study<span>AI</span></div></a>
    <div class="header-badge">Tamil & English AI</div>
  </div>
</header>

<div class="hero">
  <h1>படிப்பு கேள்விகளுக்கு<br><span>உடனடி விடை பெறுங்கள்!</span></h1>
  <p>கணிதம், அறிவியல், வரலாறு என எதையும் தமிழில் கேட்டுப் தெரிந்துகொள்ளுங்கள்! 🎓</p>
</div>

<div class="subjects-section">
  <div class="chips">
    <button class="chip active" onclick="selectSubject(this,'கணிதம்')">🔢 கணிதம்</button>
    <button class="chip" onclick="selectSubject(this,'அறிவியல்')">🔬 அறிவியல்</button>
    <button class="chip" onclick="selectSubject(this,'வரலாறு')">🏛️ வரலாறு</button>
    <button class="chip" onclick="selectSubject(this,'தமிழ்')">🌺 தமிழ்</button>
    <button class="chip" onclick="selectSubject(this,'பொது அறிவு')">🌍 பொது அறிவு</button>
  </div>
</div>

<div class="chat-wrapper">
  <div class="chat-box">
    <div class="chat-header">
      <div style="color:white; font-weight:bold;">StudyAI உதவியாளர் 🤖</div>
    </div>
    <div class="messages" id="messages">
      <div class="msg ai">
        <div class="msg-bubble">வணக்கம்! நான் StudyAI. உங்கள் படிப்பு தொடர்பான கேள்விகளைக் கேளுங்கள்.</div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="input-row">
        <textarea id="questionInput" placeholder="கேள்வியைக் கேளுங்கள்..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="askQuestion()">➤</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 StudyAI | Made with ❤️ for Students</p>
</footer>

<script>
  let selectedSubject = 'கணிதம்';
  let isLoading = false;

  // --- API CONFIG ---
  // உங்கள் API Key இங்கே பாதுகாப்பாக உள்ளது
  const API_KEY = "AIzaSyAC-IgeJ2BeJSsEH_ffTYrE9LdPTxKuFT0"; 
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

  function selectSubject(btn, subject) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    selectedSubject = subject;
  }

  function addMessage(content, role) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    // Bold text support
    let formatted = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    div.innerHTML = `<div class="msg-bubble">${formatted}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function askQuestion() {
    if (isLoading) return;
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;

    isLoading = true;
    input.value = '';
    addMessage(question, 'user');
    
    // Show Typing
    const msgs = document.getElementById('messages');
    const typing = document.createElement('div');
    typing.id = 'typing';
    typing.className = 'typing-indicator';
    typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    msgs.appendChild(typing);

    const systemPrompt = `நீ ஒரு சிறந்த ஆசிரியர். மாணவர் கேட்கும் ${selectedSubject} தொடர்பான கேள்விக்குத் தமிழில் எளிமையாகப் பதில் சொல். முக்கியமானவற்றை தடிமனாக (Bold) காட்டு.`;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: systemPrompt + "\n\nகேள்வி: " + question }] }]
        })
      });

      const data = await response.json();
      document.getElementById('typing').remove();

      if (data.candidates && data.candidates[0].content.parts[0].text) {
        addMessage(data.candidates[0].content.parts[0].text, 'ai');
      } else {
        addMessage("மன்னிக்கவும், பதில் கிடைக்கவில்லை. மீண்டும் ஒருமுறை கேளுங்கள்.", "ai");
        console.log("Error details:", data);
      }
    } catch (error) {
      document.getElementById('typing').remove();
      addMessage("இணைய இணைப்பு அல்லது API சிக்கல். மீண்டும் முயற்சிக்கவும்.", "ai");
      console.error("Fetch Error:", error);
    }
    isLoading = false;
  }
</script>
</body>
</html>
